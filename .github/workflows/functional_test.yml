name: "Functional tests"
# Runs automated test suites that ensure functionality is preserved. Any failures should prevent code from shipping.
on:
  pull_request:
    branches: [main, release]

permissions:
  contents: read

jobs:
  test:
    name: test with ${{ matrix.env }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        env: ["3.10", "3.11"]
        os: [ubuntu-latest, macos-latest]
        include:
          - env: "3.12"
            os: ubuntu-latest
            experimental: true
          - env: "3.12"
            os: macos-latest
            experimental: true
          - env: "3.13"
            os: ubuntu-latest
            experimental: true
          - env: "3.13"
            os: macos-latest
            experimental: true
          - env: "3.14"
            os: ubuntu-latest
            experimental: true
          - env: "3.14"
            os: macos-latest
            experimental: true
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run Tests
        run: |
          uv run --python ${{ matrix.env }} pytest \
            --color=yes
